# ============================================
# COOTRACOVI - Docker Compose
# Sistema de Procesos Disciplinarios
# ============================================
# Uso: docker-compose up -d

version: '3.8'

services:
  # ------------------------------------------
  # Base de datos MySQL
  # ------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: cootracovi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: disciplinarios
      MYSQL_USER: cootracovi
      MYSQL_PASSWORD: Cootracovi2026!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cootracovi-network

  # ------------------------------------------
  # Aplicación COOTRACOVI
  # ------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cootracovi-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://cootracovi:Cootracovi2026!@mysql:3306/disciplinarios
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-secret-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NODE_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backups:/var/backups/cootracovi
      - ./documentos:/app/documentos
    networks:
      - cootracovi-network

  # ------------------------------------------
  # PhpMyAdmin (Opcional - para administración)
  # ------------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cootracovi-pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: cootracovi
      PMA_PASSWORD: Cootracovi2026!
      UPLOAD_LIMIT: 50M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - cootracovi-network

  # ------------------------------------------
  # Nginx Reverse Proxy (Opcional)
  # ------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: cootracovi-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - cootracovi-network

networks:
  cootracovi-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
